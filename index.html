

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDN Quest 🎓 — Bibliothèque de quiz</title>
<style>
:root {
  --navy: #1F3864; --navy-light: #2F5496; --navy-dark: #0F1F3F;
  --red: #C00000; --red-light: #FADBD8;
  --green: #375623; --green-light: #D5E8D4;
  --orange: #C55A11; --orange-light: #FCE5CD;
  --blue: #2F5496; --blue-light: #D5E8F0;
  --gold: #D4A017; --gold-light: #FEF9E7;
  --purple: #6B46C1; --purple-light: #EDE9FE;
  --bg: #F7F9FC; --card: #FFFFFF;
  --text: #1A1A2E; --muted: #6B7280; --muted-light: #9CA3AF;
  --border: #E5E7EB; --border-dark: #D1D5DB;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: linear-gradient(135deg, #EEF2FF 0%, #F7F9FC 50%, #E0F2FE 100%);
  background-attachment: fixed;
  color: var(--text); min-height: 100vh; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.app-shell { max-width: 1100px; margin: 0 auto; padding: 16px; }

.app-header {
  background: var(--navy); color: white; padding: 18px 26px;
  border-radius: 16px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 14px;
  box-shadow: 0 6px 24px rgba(31,56,100,0.2); margin-bottom: 16px;
}
.app-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.app-logo .emoji { font-size: 30px; }
.app-logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.app-logo .sub { font-size: 11px; opacity: 0.75; font-weight: 500; display: block; margin-top: 1px; letter-spacing: 0.3px; }
.app-nav { display: flex; gap: 8px; flex-wrap: wrap; }
.nav-btn {
  background: rgba(255,255,255,0.1); color: white;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.nav-btn:hover { background: rgba(255,255,255,0.22); }
.nav-btn.primary { background: var(--gold); border-color: var(--gold); color: var(--navy-dark); }
.nav-btn.primary:hover { background: #E5B02D; }

.view {
  background: var(--card); border-radius: 16px; padding: 26px;
  box-shadow: 0 10px 30px rgba(31,56,100,0.07); min-height: 500px;
}

.filters-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.search-input {
  flex: 1; min-width: 200px; padding: 11px 16px 11px 40px;
  border: 2px solid var(--border); border-radius: 10px;
  font-size: 14px; font-family: inherit;
  background: var(--bg) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' fill='none' stroke='%236B7280' stroke-width='2' viewBox='0 0 24 24'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.35-4.35'/></svg>") no-repeat 12px center;
}
.search-input:focus { outline: none; border-color: var(--navy); background-color: white; }
.filter-select {
  padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px;
  font-size: 13px; font-family: inherit; background: white; cursor: pointer; font-weight: 500;
}
.filter-select:focus { outline: none; border-color: var(--navy); }

.status-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.status-chip {
  padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: white;
  transition: all 0.15s; font-family: inherit;
  display: inline-flex; align-items: center; gap: 5px;
}
.status-chip:hover { border-color: var(--navy); }
.status-chip.active { background: var(--navy); color: white; border-color: var(--navy); }
.status-chip.active.new { background: var(--blue); border-color: var(--blue); }
.status-chip.active.todo { background: var(--red); border-color: var(--red); }
.status-chip.active.progress { background: var(--orange); border-color: var(--orange); }
.status-chip.active.mastered { background: var(--green); border-color: var(--green); }

.specialty-group {
  margin-bottom: 18px; border: 1.5px solid var(--border);
  border-radius: 14px; overflow: hidden; background: white;
}
.specialty-header {
  padding: 14px 20px;
  background: linear-gradient(135deg, #F9FBFF, #F0F4FF);
  border-bottom: 1px solid var(--border); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s; user-select: none;
}
.specialty-header:hover { background: linear-gradient(135deg, #EEF2FF, #E0E7FF); }
.specialty-title {
  font-size: 16px; font-weight: 700; color: var(--navy);
  display: flex; align-items: center; gap: 10px;
}
.specialty-count { background: var(--navy); color: white; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.specialty-arrow { font-size: 13px; color: var(--muted); transition: transform 0.2s; }
.specialty-group.collapsed .specialty-arrow { transform: rotate(-90deg); }
.specialty-body { padding: 14px 16px; }
.specialty-group.collapsed .specialty-body { display: none; }

.item-group { margin-bottom: 12px; }
.item-header {
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.7px;
  padding: 4px 0 8px; border-bottom: 1px dashed var(--border); margin-bottom: 10px;
}

.quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.quiz-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
}
.quiz-card::before {
  content:''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--status-color, var(--navy));
}
.quiz-card:hover { border-color: var(--navy); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(31,56,100,0.1); }
.qc-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.qc-icon { font-size: 24px; flex-shrink: 0; line-height: 1; }
.qc-title { font-size: 14px; font-weight: 700; color: var(--navy); line-height: 1.35; }
.qc-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.qc-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 8px;
  font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase;
}
.qc-badge.rang-a { background: var(--red-light); color: var(--red); }
.qc-badge.rang-b { background: var(--blue-light); color: var(--blue); }
.qc-badge.rang-c { background: var(--purple-light); color: var(--purple); }
.qc-badge.item { background: var(--bg); color: var(--navy); border: 1px solid var(--border); }
.qc-badge.status-new { background: var(--blue-light); color: var(--blue); }
.qc-badge.status-todo { background: var(--red-light); color: var(--red); }
.qc-badge.status-progress { background: var(--orange-light); color: var(--orange); }
.qc-badge.status-mastered { background: var(--green-light); color: var(--green); }
.qc-footer {
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--muted);
}
.qc-stats { display: flex; gap: 10px; }
.qc-stat { display: inline-flex; align-items: center; gap: 3px; }
.qc-actions { display: flex; gap: 4px; }
.icon-btn {
  background: none; border: none; padding: 4px 6px; cursor: pointer;
  color: var(--muted); border-radius: 5px; transition: all 0.1s;
  font-family: inherit; font-size: 13px;
}
.icon-btn:hover { background: var(--bg); color: var(--navy); }
.icon-btn.danger:hover { background: var(--red-light); color: var(--red); }

.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-state .big-emoji { font-size: 60px; margin-bottom: 14px; display: block; opacity: 0.6; }
.empty-state h3 { color: var(--navy); font-size: 18px; margin-bottom: 6px; }
.empty-state p { font-size: 14px; margin-bottom: 18px; max-width: 400px; margin-left: auto; margin-right: auto; }

.modal-backdrop {
  position: fixed; inset: 0; background: rgba(15,31,63,0.5);
  backdrop-filter: blur(4px); display: flex; align-items: center;
  justify-content: center; z-index: 100; padding: 20px;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: white; border-radius: 16px;
  max-width: 680px; width: 100%; max-height: 88vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: slideUp 0.3s;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-head {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: white; border-radius: 16px 16px 0 0; z-index: 2;
}
.modal-head h2 { color: var(--navy); font-size: 18px; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 22px; padding: 0 4px; border-radius: 5px; }
.modal-close:hover { color: var(--red); }
.modal-body { padding: 22px 24px; }
.modal-foot {
  padding: 16px 24px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
  background: var(--bg); border-radius: 0 0 16px 16px;
}

.import-tabs { display: flex; gap: 6px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.import-tab {
  padding: 10px 16px; background: none; border: none; cursor: pointer;
  font-size: 14px; font-weight: 600; color: var(--muted);
  border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: inherit;
}
.import-tab.active { color: var(--navy); border-bottom-color: var(--navy); }
.import-tab:hover:not(.active) { color: var(--navy-light); }

.json-textarea {
  width: 100%; min-height: 240px; padding: 14px;
  border: 2px solid var(--border); border-radius: 10px;
  font-family: "Menlo", "Monaco", "Courier New", monospace;
  font-size: 12px; line-height: 1.5; resize: vertical;
}
.json-textarea:focus { outline: none; border-color: var(--navy); }

.file-drop {
  border: 2px dashed var(--border-dark); border-radius: 10px;
  padding: 30px 20px; text-align: center; background: var(--bg);
  cursor: pointer; transition: all 0.15s;
}
.file-drop:hover { border-color: var(--navy); background: #EEF4FF; }
.file-drop.dragging { border-color: var(--navy); background: #E0E7FF; }
.file-drop .icon { font-size: 36px; margin-bottom: 10px; }
.file-drop .main-text { font-weight: 600; color: var(--navy); font-size: 14px; }
.file-drop .sub-text { font-size: 12px; color: var(--muted); margin-top: 4px; }

.alert {
  padding: 12px 14px; border-radius: 8px;
  font-size: 13px; margin-bottom: 12px; line-height: 1.5;
}
.alert.error { background: var(--red-light); color: var(--red); border-left: 3px solid var(--red); }
.alert.success { background: var(--green-light); color: var(--green); border-left: 3px solid var(--green); }
.alert.info { background: var(--blue-light); color: var(--navy); border-left: 3px solid var(--blue); }
.alert.warning { background: var(--gold-light); color: #8B6914; border-left: 3px solid var(--gold); }

.preview-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-top: 12px;
}
.preview-box h4 { color: var(--navy); font-size: 14px; margin-bottom: 8px; }
.preview-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
.preview-stat {
  background: white; padding: 8px; border-radius: 6px;
  text-align: center; font-size: 11px; color: var(--muted);
}
.preview-stat strong { display: block; font-size: 18px; color: var(--navy); }

.btn {
  background: var(--navy); color: white; border: none;
  padding: 11px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--navy-light); transform: translateY(-1px); }
.btn:disabled { background: var(--border-dark); cursor: not-allowed; transform: none; }
.btn.ghost { background: transparent; color: var(--navy); border: 2px solid var(--navy); }
.btn.ghost:hover { background: var(--navy); color: white; }
.btn.success { background: var(--green); }
.btn.success:hover { background: #2E4A1F; }
.btn.danger { background: var(--red); }
.btn.danger:hover { background: #9B0000; }
.btn.ghost.danger { background: transparent; color: var(--red); border-color: var(--red); }
.btn.ghost.danger:hover { background: var(--red); color: white; }

.player-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.player-head .back-btn {
  background: var(--bg); border: 1px solid var(--border);
  padding: 8px 14px; border-radius: 10px; font-size: 13px;
  cursor: pointer; font-weight: 600; color: var(--navy); font-family: inherit;
}
.player-head .back-btn:hover { background: var(--navy); color: white; }
.player-head .title-box h2 { font-size: 19px; color: var(--navy); }
.player-head .title-box .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.player-head .score-chips { margin-left: auto; display: flex; gap: 8px; }
.chip {
  background: var(--navy); color: white; padding: 5px 11px;
  border-radius: 14px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}

.quiz-home { padding: 10px 0; }
.quiz-desc {
  background: var(--blue-light); border-left: 4px solid var(--navy);
  padding: 14px 18px; border-radius: 10px; margin-bottom: 20px;
}
.quiz-desc .meta-line { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.modes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; margin-top: 8px; }
.mode-card {
  background: white; border: 2px solid var(--border); border-radius: 12px;
  padding: 18px; cursor: pointer; transition: all 0.15s;
  position: relative; overflow: hidden;
}
.mode-card::before {
  content:''; position: absolute; top: 0; left: 0;
  width: 4px; height: 100%; background: var(--accent, var(--navy));
  transition: width 0.15s;
}
.mode-card:hover { border-color: var(--accent, var(--navy)); transform: translateY(-2px); }
.mode-card:hover::before { width: 8px; }
.mode-card.disabled { opacity: 0.5; cursor: not-allowed; }
.mode-card .mode-icon { font-size: 30px; display: block; margin-bottom: 8px; }
.mode-card h3 { color: var(--navy); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mode-card p { font-size: 12px; color: var(--muted); line-height: 1.4; }
.mode-card .count {
  display: inline-block; margin-top: 8px; background: var(--bg);
  padding: 2px 9px; border-radius: 10px; font-size: 10px;
  font-weight: 700; color: var(--navy); letter-spacing: 0.3px;
}

.qbox { background: white; border: 2px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 18px; }
.qhead {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.qtitle { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.qcategory { background: var(--blue-light); color: var(--navy); padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; }
.qtext { font-size: 16px; line-height: 1.55; color: var(--text); margin-bottom: 18px; font-weight: 500; }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  background: var(--bg); border: 2px solid var(--border);
  padding: 13px 16px; border-radius: 10px; cursor: pointer;
  font-size: 14px; text-align: left; transition: all 0.15s;
  font-family: inherit; color: var(--text);
  display: flex; align-items: center; gap: 12px;
}
.opt:hover:not(:disabled) { border-color: var(--navy); background: #EEF2FF; }
.opt:disabled { cursor: default; }
.opt .letter {
  background: white; border: 1.5px solid var(--border);
  width: 26px; height: 26px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; flex-shrink: 0; color: var(--navy);
}
.opt.correct { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 600; }
.opt.correct .letter { background: var(--green); color: white; border-color: var(--green); }
.opt.wrong { background: var(--red-light); border-color: var(--red); color: var(--red); }
.opt.wrong .letter { background: var(--red); color: white; border-color: var(--red); }
.opt.selected-multi { border-color: var(--purple); background: var(--purple-light); }

.feedback {
  margin-top: 14px; padding: 13px 16px; border-radius: 10px;
  font-size: 13px; line-height: 1.55;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}
.feedback.correct { background: var(--green-light); border-left: 4px solid var(--green); color: var(--green); }
.feedback.wrong { background: var(--red-light); border-left: 4px solid var(--red); color: var(--red); }
.feedback .explain { margin-top: 7px; color: var(--text); font-weight: 400; }

.progress-bar { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--navy), var(--navy-light));
  border-radius: 4px; transition: width 0.4s;
}
.nav-row { display: flex; gap: 10px; justify-content: space-between; margin-top: 18px; flex-wrap: wrap; }

.flashcard { perspective: 1200px; min-height: 320px; margin-bottom: 18px; }
.flashcard-inner {
  position: relative; width: 100%; min-height: 320px;
  transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer;
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; width: 100%; min-height: 320px;
  backface-visibility: hidden; border-radius: 14px; padding: 26px;
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; text-align: center; border: 2px solid var(--border);
}
.flashcard-front { background: linear-gradient(135deg, #FFFFFF, #F0F9FF); }
.flashcard-back {
  background: linear-gradient(135deg, #EEF4FF, #E0F2FE);
  transform: rotateY(180deg); border-color: var(--navy);
}
.flashcard .fc-tag {
  position: absolute; top: 14px; left: 14px;
  background: var(--navy); color: white; padding: 4px 11px;
  border-radius: 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
}
.flashcard .fc-hint {
  position: absolute; bottom: 14px; right: 14px;
  font-size: 10px; color: var(--muted); font-style: italic;
}
.fc-front-text { font-size: 20px; font-weight: 600; color: var(--navy); max-width: 600px; line-height: 1.35; }
.fc-back-text { font-size: 15px; line-height: 1.55; color: var(--text); max-width: 680px; }
.fc-back-text strong { color: var(--navy); font-weight: 700; }
.fc-back-text em { color: var(--red); font-style: normal; font-weight: 600; }

.vf-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
.vf-btn {
  padding: 20px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--bg); cursor: pointer; font-size: 17px; font-weight: 700;
  font-family: inherit; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.vf-btn.vrai:hover:not(:disabled) { background: var(--green-light); border-color: var(--green); color: var(--green); }
.vf-btn.faux:hover:not(:disabled) { background: var(--red-light); border-color: var(--red); color: var(--red); }
.vf-btn.selected.vrai { background: var(--green); color: white; border-color: var(--green); }
.vf-btn.selected.faux { background: var(--red); color: white; border-color: var(--red); }
.vf-btn:disabled { cursor: default; opacity: 0.6; }
.vf-btn.correct-answer { border: 3px solid var(--gold); box-shadow: 0 0 0 4px rgba(212,160,23,0.18); }

.match-board { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 18px; }
.match-col h4 { text-align: center; margin-bottom: 12px; color: var(--navy); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
.match-item {
  background: var(--bg); border: 2px solid var(--border);
  padding: 11px 14px; border-radius: 10px; margin-bottom: 9px;
  cursor: pointer; font-size: 13px; transition: all 0.15s; user-select: none;
}
.match-item:hover { border-color: var(--navy); background: #EEF2FF; }
.match-item.selected { background: var(--navy); color: white; border-color: var(--navy); }
.match-item.matched {
  background: var(--green-light); border-color: var(--green); color: var(--green);
  cursor: default; text-decoration: line-through; opacity: 0.65;
}
.match-item.error { animation: shake 0.4s; background: var(--red-light); border-color: var(--red); }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); } 75% { transform: translateX(5px); }
}

/* ============================================================
   UTILITAIRES
   ============================================================ */
function $(id){ return document.getElementById(id); }
function el(tag, props, children) {
  props = props || {}; children = children || [];
  const e = document.createElement(tag);
  Object.keys(props).forEach(k=>{
    if(k==='className') e.className = props[k];
    else if(k==='html') e.innerHTML = props[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if(props[k] !== null && props[k] !== undefined) e.setAttribute(k, props[k]);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c === null || c === undefined) return;
    if(typeof c==='string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function genId() {
  return 'q-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
}
function escapeHtml(s) {
  if(s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(message, type) {
  type = type || 'info';
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = el('div', { className: 'toast ' + type });
  t.textContent = message;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}
function floatEmoji(emoji) {
  const e = document.createElement('div');
  e.className = 'emoji-float';
  e.textContent = emoji;
  e.style.left = (window.innerWidth/2 - 20) + 'px';
  e.style.top = (window.innerHeight/3) + 'px';
  document.body.appendChild(e);
  setTimeout(()=>e.remove(), 1200);
}
function normalizeAnswer(s) {
  return String(s||'').toLowerCase().trim()
    .replace(/[.,;!?'"]/g,'')
    .replace(/\s+/g,' ')
    .replace(/é|è|ê|ë/g,'e')
    .replace(/à|â|ä/g,'a')
    .replace(/î|ï/g,'i')
    .replace(/ô|ö/g,'o')
    .replace(/ù|û|ü/g,'u');
}
function formatDate(iso) {
  if(!iso) return 'Jamais';
  try {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / (1000*60*60*24);
    if(diff < 1) return "Aujourd'hui";
    if(diff < 2) return "Hier";
    if(diff < 7) return Math.floor(diff) + " jours";
    return d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
  } catch(e) { return '—'; }
}
function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 100);
}

/* ============================================================
   QUIZ : VALIDATION + STATUT
   ============================================================ */
function validateQuiz(q) {
  const errors = [];
  if(!q || typeof q !== 'object') { errors.push("Le quiz doit être un objet JSON valide."); return errors; }
  if(!q.title || typeof q.title !== 'string') errors.push("'title' (chaîne) est requis.");
  if(!q.specialty || typeof q.specialty !== 'string') errors.push("'specialty' (chaîne) est requis.");
  const arrays = ['flashcards','qcm','vraiFaux','associations','speed','cas'];
  let totalQ = 0;
  arrays.forEach(a => {
    if(q[a] && !Array.isArray(q[a])) errors.push(`'${a}' doit être un tableau si présent.`);
    else if(q[a]) totalQ += q[a].length;
  });
  if(totalQ === 0) errors.push("Le quiz doit contenir au moins une question.");
  if(Array.isArray(q.qcm)) {
    q.qcm.forEach((item, i) => {
      const correctOk = typeof item.correct === 'number' || (Array.isArray(item.correct) && item.correct.length >= 1);
      if(!item.q || !Array.isArray(item.options) || item.options.length < 2 || !correctOk) {
        errors.push(`QCM #${i+1} mal formé : requiert {q, options[], correct}.`);
      }
    });
  }
  if(Array.isArray(q.vraiFaux)) {
    q.vraiFaux.forEach((item, i) => {
      if(!item.statement || typeof item.answer !== 'boolean') {
        errors.push(`Vrai/Faux #${i+1} mal formé : requiert {statement, answer:bool}.`);
      }
    });
  }
  return errors;
}
function normalizeQuiz(q) {
  if(!q.id) q.id = genId();
  if(!q.createdAt) q.createdAt = new Date().toISOString();
  q.updatedAt = new Date().toISOString();
  ['flashcards','qcm','vraiFaux','associations','speed','cas'].forEach(k=>{
    if(!q[k]) q[k] = [];
  });
  if(!q.items) q.items = [];
  if(!q.rang) q.rang = [];
  if(!q.tags) q.tags = [];
  if(!q.icon) q.icon = '📘';
  return q;
}
function totalQuestionCount(q) {
  return (q.flashcards ? q.flashcards.length : 0)
    + (q.qcm ? q.qcm.length : 0)
    + (q.vraiFaux ? q.vraiFaux.length : 0)
    + (q.associations ? q.associations.length : 0)
    + (q.speed ? q.speed.length : 0)
    + (q.cas || []).reduce((n,c)=>n + (c.questions ? c.questions.length : 0), 0);
}
function getQuizStatus(quiz) {
  const s = app.stats[quiz.id];
  if(!s || !s.sessions || s.sessions.length === 0) return 'new';
  const best = Math.max.apply(null, s.sessions.map(x=>x.pct));
  const last = s.sessions[s.sessions.length-1].pct;
  if(best >= 90 && s.sessions.filter(x=>x.pct>=90).length >= 2) return 'mastered';
  if(last < 70 || best < 70) return 'todo';
  return 'progress';
}
function getQuizBestScore(quiz) {
  const s = app.stats[quiz.id];
  if(!s || !s.sessions || s.sessions.length === 0) return null;
  return Math.max.apply(null, s.sessions.map(x=>x.pct));
}

function recordSession(quizId, mode, ok, total) {
  if(total === 0) return;
  const pct = Math.round(ok/total*100);
  if(!app.stats[quizId]) app.stats[quizId] = { sessions: [] };
  app.stats[quizId].sessions.push({
    mode: mode, ok: ok, total: total, pct: pct, at: new Date().toISOString()
  });
  if(app.stats[quizId].sessions.length > 20) {
    app.stats[quizId].sessions = app.stats[quizId].sessions.slice(-20);
  }
  Storage.setStats(app.stats);
}

function renderLibrary(view) {
  if(app.library.length === 0) {
    view.appendChild(renderEmptyLibrary());
    return;
  }
  const filtersBar = el('div', { className:'filters-bar' });
  const searchInput = el('input', {
    className:'search-input',
    type:'search',
    placeholder:'Rechercher par titre, item, tag, spécialité...',
    value: app.ui.searchQuery
  });
  searchInput.addEventListener('input', (ev) => {
    app.ui.searchQuery = ev.target.value;
    renderLibraryBody();
  });
  filtersBar.appendChild(searchInput);

  const sortSelect = el('select', {
    className:'filter-select',
    onchange:(ev)=>{ app.ui.sort = ev.target.value; Storage.setUI(app.ui); renderLibraryBody(); }
  });
  [
    ['default','Tri : Spécialité → Item'],
    ['recent','Tri : Récents'],
    ['alpha','Tri : Alphabétique'],
    ['score','Tri : Meilleur score']
  ].forEach(p=>{
    const o = el('option', {value:p[0]}, [p[1]]);
    if((app.ui.sort||'default') === p[0]) o.setAttribute('selected','true');
    sortSelect.appendChild(o);
  });
  filtersBar.appendChild(sortSelect);
  view.appendChild(filtersBar);

  const statusFilters = el('div', { className:'status-filters' });
  const statusButtons = [['all','Tous'],['new','✨ Nouveau'],['todo','🔁 À revoir'],['progress','📈 En cours'],['mastered','🏆 Maîtrisé']];
  statusButtons.forEach(p => {
    const v = p[0], l = p[1];
    const cls = 'status-chip ' + v;
    const btn = el('button', {
      className: cls + (app.ui.statusFilter===v ? ' active' : ''),
      onclick: ()=>{ app.ui.statusFilter = v; Storage.setUI(app.ui); renderLibraryBody(); }
    }, [l]);
    statusFilters.appendChild(btn);
  });
  view.appendChild(statusFilters);

  const body = el('div', { id:'lib-body' });
  view.appendChild(body);
  renderLibraryBody();
}

function renderLibraryBody() {
  const body = $('lib-body');
  if(!body) return;
  body.innerHTML = '';

  const q = (app.ui.searchQuery||'').toLowerCase().trim();
  const statusF = app.ui.statusFilter || 'all';
  let filtered = app.library.filter(quiz => {
    if(statusF !== 'all' && getQuizStatus(quiz) !== statusF) return false;
    if(!q) return true;
    const hay = [
      quiz.title, quiz.specialty, quiz.description||'',
      (quiz.items||[]).join(' '),
      (quiz.tags||[]).join(' '),
      (quiz.rang||[]).join(' '),
      'chap ' + (quiz.chapter||'')
    ].join(' ').toLowerCase();
    return hay.indexOf(q) !== -1;
  });

  if(filtered.length === 0) {
    body.appendChild(el('div', { className:'empty-state' }, [
      el('span', { className:'big-emoji' }, ['🔍']),
      el('h3', {}, ['Aucun quiz ne correspond aux filtres']),
      el('p', {}, ['Réinitialise les filtres ou importe un nouveau quiz.'])
    ]));
    return;
  }

  const sort = app.ui.sort || 'default';

  if(sort === 'default') {
    const bySpec = {};
    filtered.forEach(quiz => {
      const spec = quiz.specialty || 'Autre';
      if(!bySpec[spec]) bySpec[spec] = [];
      bySpec[spec].push(quiz);
    });
    const orderedSpecs = Object.keys(bySpec).sort((a,b)=>{
      const ia = EDN_SPECIALTIES.indexOf(a);
      const ib = EDN_SPECIALTIES.indexOf(b);
      if(ia === -1 && ib === -1) return a.localeCompare(b);
      if(ia === -1) return 1;
      if(ib === -1) return -1;
      return ia - ib;
    });
    orderedSpecs.forEach(spec => {
      body.appendChild(renderSpecialtyGroup(spec, bySpec[spec]));
    });
  } else {
    const sorted = filtered.slice().sort((a,b)=>{
      if(sort === 'recent') {
        const sa = app.stats[a.id] && app.stats[a.id].sessions || [];
        const sb = app.stats[b.id] && app.stats[b.id].sessions || [];
        const da = sa.length ? new Date(sa[sa.length-1].at).getTime() : new Date(a.updatedAt||0).getTime();
        const db = sb.length ? new Date(sb[sb.length-1].at).getTime() : new Date(b.updatedAt||0).getTime();
        return db - da;
      }
      if(sort === 'alpha') return a.title.localeCompare(b.title);
      if(sort === 'score') return (getQuizBestScore(b)||0) - (getQuizBestScore(a)||0);
      return 0;
    });
    const grid = el('div', { className:'quiz-grid' });
    sorted.forEach(q => grid.appendChild(renderQuizCard(q)));
    body.appendChild(grid);
  }
}

function renderSpecialtyGroup(spec, quizzes) {
  const collapsed = app.ui.collapsedSpecialties[spec];
  const group = el('div', { className: 'specialty-group' + (collapsed ? ' collapsed' : '') });
  const header = el('div', {
    className:'specialty-header',
    onclick: ()=>{
      app.ui.collapsedSpecialties[spec] = !app.ui.collapsedSpecialties[spec];
      Storage.setUI(app.ui);
      renderLibraryBody();
    }
  });
  header.innerHTML = `
    <div class="specialty-title">
      <span>📂</span>
      <span>${escapeHtml(spec)}</span>
      <span class="specialty-count">${quizzes.length}</span>
    </div>
    <span class="specialty-arrow">▼</span>
  `;
  group.appendChild(header);

  const body = el('div', { className:'specialty-body' });

  const byItems = {};
  quizzes.forEach(q => {
    const items = (q.items||[]).slice().sort((a,b)=>a-b);
    const key = items.length ? items.join('/') : '—';
    if(!byItems[key]) byItems[key] = { items: items, quizzes: [] };
    byItems[key].quizzes.push(q);
  });

  const sortedItemKeys = Object.keys(byItems).sort((a,b)=>{
    const na = byItems[a].items[0] || 999;
    const nb = byItems[b].items[0] || 999;
    return na - nb;
  });

  sortedItemKeys.forEach(key => {
    const g = byItems[key];
    const itemGroup = el('div', { className:'item-group' });
    const hdr = el('div', { className:'item-header' });
    if(g.items.length) {
      hdr.textContent = g.items.length === 1 ? `Item ${g.items[0]}` : `Items ${g.items.join(' / ')}`;
    } else {
      hdr.textContent = 'Sans item référencé';
    }
    itemGroup.appendChild(hdr);
    // Sort quizzes inside same item group by rang then by title
    const sorted = g.quizzes.slice().sort((a,b)=>{
      const ra = (a.rang||[])[0] || 'Z';
      const rb = (b.rang||[])[0] || 'Z';
      if(ra !== rb) return ra.localeCompare(rb);
      return a.title.localeCompare(b.title);
    });
    const grid = el('div', { className:'quiz-grid' });
    sorted.forEach(q => grid.appendChild(renderQuizCard(q)));
    itemGroup.appendChild(grid);
    body.appendChild(itemGroup);
  });

  group.appendChild(body);
  return group;
}

function renderQuizCard(quiz) {
  const status = getQuizStatus(quiz);
  const statusInfo = STATUS_DEF[status];
  const best = getQuizBestScore(quiz);
  const stats = app.stats[quiz.id];
  const played = stats && stats.sessions ? stats.sessions.length : 0;
  const statusColor = { 'new':'var(--blue)', 'todo':'var(--red)', 'progress':'var(--orange)', 'mastered':'var(--green)' }[status];

  const card = el('div', { className:'quiz-card' });
  card.style.setProperty('--status-color', statusColor);
  card.addEventListener('click', (e) => {
    if(e.target.closest('.icon-btn')) return;
    navigate('quiz', { id: quiz.id });
  });

  const rangHtml = (quiz.rang||[]).map(r=>`<span class="qc-badge rang-${r.toLowerCase()}">Rang ${r}</span>`).join('');
  const itemsShown = (quiz.items||[]).slice(0,3).map(i=>`<span class="qc-badge item">Item ${i}</span>`).join('');
  const itemsMore = (quiz.items||[]).length>3 ? `<span class="qc-badge item">+${quiz.items.length-3}</span>` : '';

  card.innerHTML = `
    <div class="qc-head">
      <span class="qc-icon">${quiz.icon || '📘'}</span>
      <div style="flex:1;min-width:0;">
        <div class="qc-title">${escapeHtml(quiz.title)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">${totalQuestionCount(quiz)} questions</div>
      </div>
    </div>
    <div class="qc-meta">
      ${rangHtml}${itemsShown}${itemsMore}
      <span class="qc-badge status-${status}">${statusInfo.icon} ${statusInfo.label}</span>
    </div>
    <div class="qc-footer">
      <div class="qc-stats">
        ${played > 0 ? `<span class="qc-stat">🎯 ${best}%</span><span class="qc-stat">🔄 ${played}</span>` : '<span class="qc-stat" style="opacity:0.6;">Jamais joué</span>'}
      </div>
      <div class="qc-actions">
        <button class="icon-btn" title="Modifier les questions">✏️</button>
        <button class="icon-btn" title="Exporter ce quiz (JSON)">⬇</button>
        <button class="icon-btn danger" title="Supprimer ce quiz">🗑</button>
      </div>
    </div>
  `;
  const actions = card.querySelectorAll('.icon-btn');
  actions[0].addEventListener('click', (e)=>{ e.stopPropagation(); openEditModal(quiz); });
  actions[1].addEventListener('click', (e)=>{ e.stopPropagation(); exportQuiz(quiz); });
  actions[2].addEventListener('click', (e)=>{ e.stopPropagation(); deleteQuiz(quiz); });
  return card;
}

function renderEmptyLibrary() {
  const div = el('div', { className:'empty-state' });
  div.innerHTML = `
    <span class="big-emoji">📚</span>
    <h3>Ta bibliothèque est vide</h3>
    <p>Importe ton premier quiz au format JSON. Consulte le <strong>Schéma JSON</strong> pour générer tes quiz via un script Node.js.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">

      <button class="btn ghost" onclick="navigate('help')">📖 Voir le schéma JSON</button>

function exportQuiz(quiz) {
  const safe = quiz.title.replace(/[^a-zA-Z0-9-_]/g,'_').slice(0,40);
  const copy = Object.assign({}, quiz);
  downloadJson(`quiz_${safe}.json`, copy);
  toast(`Export : ${quiz.title}`, 'success');
}

function openEditModal(quiz) {
  const backdrop = el('div', { className:'modal-backdrop' });
  backdrop.addEventListener('click', e => { if(e.target === backdrop) backdrop.remove(); });

  const modal = el('div', { className:'modal edit-modal' });
  modal.innerHTML = `
    <div class="modal-head">
      <h2>✏️ Modifier — ${escapeHtml(quiz.title)}</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body" id="edit-modal-body"></div>
    <div class="modal-foot">
      <button class="btn ghost" id="edit-cancel">Fermer</button>
    </div>
  `;
  modal.querySelector('.modal-close').addEventListener('click', () => backdrop.remove());
  modal.querySelector('#edit-cancel').addEventListener('click', () => backdrop.remove());

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  renderEditBody(quiz, modal.querySelector('#edit-modal-body'));
}

function renderEditBody(quiz, container) {
  container.innerHTML = '';
  EDIT_SECTIONS.forEach(sec => {
    const items = quiz[sec.key] || [];
    const section = el('div', { className:'edit-section collapsed' });

    const head = el('div', { className:'edit-section-head' });
    head.innerHTML = `
      <div class="edit-section-title">
        ${sec.icon} ${sec.label}
        <span class="edit-section-count">${items.length}</span>
      </div>
      <span class="edit-section-arrow">▼</span>
    `;
    head.addEventListener('click', () => section.classList.toggle('collapsed'));
    section.appendChild(head);

    const body = el('div', { className:'edit-section-body' });

    if(items.length === 0) {
      const empty = el('div', { style:'padding:14px 16px;font-size:13px;color:var(--muted);font-style:italic;' });
      empty.textContent = 'Aucun élément dans cette section.';
      body.appendChild(empty);
    } else {
      items.forEach((item, idx) => {
        const row = el('div', { className:'edit-q-item' });
        const num = el('div', { className:'edit-q-num' });
        num.textContent = idx + 1;
        const textDiv = el('div', { className:'edit-q-text' });
        // strip html tags for preview
        const previewText = sec.preview(item).replace(/<[^>]+>/g, '');
        textDiv.textContent = previewText.length > 100 ? previewText.slice(0, 100) + '…' : previewText;
        const subText = sec.sub(item);
        if(subText) {
          const sub = el('div', { className:'edit-q-sub' });
          sub.textContent = subText;
          textDiv.appendChild(sub);
        }
        const actions = el('div', { className:'edit-q-actions' });
        const editBtn = el('button', { className:'edit-q-btn', title:'Modifier' });
        editBtn.textContent = '✏️ Modifier';
        editBtn.addEventListener('click', () => openQuestionEditor(quiz, sec.key, idx, () => {
          saveQuizToLibrary(quiz);
          renderEditBody(quiz, container);
        }));
        const delBtn = el('button', { className:'edit-q-btn danger', title:'Supprimer' });
        delBtn.textContent = '🗑';
        delBtn.addEventListener('click', () => {
          if(!confirm(`Supprimer la question ${idx + 1} de "${sec.label}" ?`)) return;
          quiz[sec.key].splice(idx, 1);
          saveQuizToLibrary(quiz);
          renderEditBody(quiz, container);
        });
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        row.appendChild(num);
        row.appendChild(textDiv);
        row.appendChild(actions);
        body.appendChild(row);
      });
    }
    section.appendChild(body);
    container.appendChild(section);
  });
}

function saveQuizToLibrary(quiz) {
  const idx = app.library.findIndex(q => q.id === quiz.id);
  if(idx !== -1) app.library[idx] = quiz;
  Storage.setLibrary(app.library);
  toast('Quiz mis à jour ✓', 'success');
}

/* ---------- Éditeur d'une question individuelle ---------- */
function openQuestionEditor(quiz, sectionKey, itemIdx, onSave) {
  const item = quiz[sectionKey][itemIdx];
  const backdrop = el('div', { className:'modal-backdrop', style:'z-index:200;' });
  backdrop.addEventListener('click', e => { if(e.target === backdrop) backdrop.remove(); });

  const modal = el('div', { className:'modal', style:'max-width:660px;' });
  const title = { flashcards:'Flashcard', qcm:'QCM', vraiFaux:'Vrai/Faux', speed:'Défi Express', associations:'Association', cas:'Cas clinique' }[sectionKey] || sectionKey;
  modal.innerHTML = `
    <div class="modal-head">
      <h2>✏️ ${title} #${itemIdx + 1}</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body" id="qedit-body" style="max-height:70vh;overflow-y:auto;"></div>
    <div class="modal-foot">
      <button class="btn ghost" id="qedit-cancel">Annuler</button>
      <button class="btn primary" id="qedit-save">💾 Enregistrer</button>
    </div>
  `;
  modal.querySelector('.modal-close').addEventListener('click', () => backdrop.remove());
  modal.querySelector('#qedit-cancel').addEventListener('click', () => backdrop.remove());

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  const body = modal.querySelector('#qedit-body');
  const fields = buildQuestionFields(sectionKey, item, body);

  modal.querySelector('#qedit-save').addEventListener('click', () => {
    const updated = collectQuestionFields(sectionKey, item, fields);
    if(!updated) return; // validation failed
    Object.assign(quiz[sectionKey][itemIdx], updated);
    backdrop.remove();
    onSave();
  });
}

function field(label, inputEl) {
  const wrap = el('div', { className:'qedit-field' });
  const lbl = el('label', { className:'qedit-label' });
  lbl.textContent = label;
  wrap.appendChild(lbl);
  wrap.appendChild(inputEl);
  return wrap;
}
function textarea(value, rows) {
  const t = el('textarea', { className:'qedit-textarea' });
  t.value = value || '';
  t.rows = rows || 3;
  return t;
}
function input(value) {
  const i = el('input', { className:'qedit-input', type:'text' });
  i.value = value || '';
  return i;
}

function buildQuestionFields(sectionKey, item, body) {
  const refs = {};

  if(sectionKey === 'flashcards') {
    refs.cat = input(item.cat || '');
    refs.front = textarea(item.front, 2);
    refs.back = textarea(item.back, 4);
    body.appendChild(field('Catégorie', refs.cat));
    body.appendChild(field('Question (front)', refs.front));
    body.appendChild(field('Réponse HTML (back)', refs.back));
  }

  else if(sectionKey === 'qcm') {
    refs.q = textarea(item.q, 3);
    body.appendChild(field('Question', refs.q));
    // Options
    const isMulti = Array.isArray(item.correct);
    const optWrap = el('div', { className:'qedit-field' });
    const optLbl = el('label', { className:'qedit-label' });
    optLbl.textContent = isMulti ? 'Options (cocher les bonnes réponses)' : 'Options (sélectionner la bonne réponse)';
    optWrap.appendChild(optLbl);
    const optList = el('div', { className:'qedit-options' });
    refs.optInputs = [];
    refs.correctToggles = [];
    (item.options || ['','','','']).forEach((opt, oi) => {
      const row = el('div', { className:'qedit-option' });
      const letter = el('div', { className:'qedit-option-letter' });
      letter.textContent = ['A','B','C','D','E'][oi];
      const txt = el('input', { type:'text', value: opt });
      const isCorrect = isMulti ? item.correct.includes(oi) : item.correct === oi;
      const toggle = el('div', { className:'qedit-option-correct' + (isCorrect ? ' selected' : ''), title: 'Bonne réponse' });
      toggle.dataset.idx = oi;
      toggle.addEventListener('click', () => {
        if(!isMulti) {
          refs.correctToggles.forEach(t => t.classList.remove('selected'));
        }
        toggle.classList.toggle('selected');
      });
      row.appendChild(toggle);
      row.appendChild(letter);
      row.appendChild(txt);
      refs.optInputs.push(txt);
      refs.correctToggles.push(toggle);
      optList.appendChild(row);
    });
    const note = el('div', { className:'qedit-multi-note' });
    note.textContent = isMulti ? '✔ QCM multi — plusieurs réponses possibles.' : 'QCM mono — une seule réponse.';
    optWrap.appendChild(optList);
    optWrap.appendChild(note);
    body.appendChild(optWrap);
    refs.explain = textarea(item.explain, 3);
    refs.isMulti = isMulti;
    body.appendChild(field('Explication HTML', refs.explain));
  }

  else if(sectionKey === 'vraiFaux') {
    refs.statement = textarea(item.statement, 2);
    body.appendChild(field('Affirmation', refs.statement));
    // Toggle V/F
    const vfWrap = el('div', { className:'qedit-field' });
    const vfLbl = el('label', { className:'qedit-label' });
    vfLbl.textContent = 'Réponse correcte';
    const vfRow = el('div', { className:'qedit-correct-row' });
    const vBtn = el('button', { className:'toggle-correct-btn' + (item.answer === true ? ' on' : ''), type:'button' });
    vBtn.textContent = '✅ VRAI';
    const fBtn = el('button', { className:'toggle-correct-btn' + (item.answer === false ? ' on' : ''), type:'button' });
    fBtn.textContent = '❌ FAUX';
    vBtn.addEventListener('click', () => { vBtn.classList.add('on'); fBtn.classList.remove('on'); });
    fBtn.addEventListener('click', () => { fBtn.classList.add('on'); vBtn.classList.remove('on'); });
    refs.vBtn = vBtn; refs.fBtn = fBtn;
    vfRow.appendChild(vBtn); vfRow.appendChild(fBtn);
    vfWrap.appendChild(vfLbl); vfWrap.appendChild(vfRow);
    body.appendChild(vfWrap);
    refs.explain = textarea(item.explain, 3);
    body.appendChild(field('Explication HTML', refs.explain));
  }

  else if(sectionKey === 'speed') {
    refs.q = textarea(item.q, 2);
    refs.a = input(item.a);
    body.appendChild(field('Question', refs.q));
    body.appendChild(field('Réponse courte', refs.a));
  }

  else if(sectionKey === 'associations') {
    refs.title = input(item.title);
    body.appendChild(field('Titre de la manche', refs.title));
    const pairsWrap = el('div', { className:'qedit-field' });
    const pLbl = el('label', { className:'qedit-label' });
    pLbl.textContent = 'Paires (gauche → droite)';
    pairsWrap.appendChild(pLbl);
    refs.pairsLeft = [];
    refs.pairsRight = [];
    (item.pairs || []).forEach((pair, pi) => {
      const row = el('div', { style:'display:flex;gap:8px;margin-bottom:6px;align-items:center;' });
      const num = el('span', { style:'font-size:11px;color:var(--muted);min-width:16px;font-weight:700;' });
      num.textContent = pi + 1;
      const lIn = el('input', { type:'text', value: pair.left || '', style:'flex:1;padding:7px 10px;border:2px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;' });
      const arrow = el('span', { style:'color:var(--muted);' });
      arrow.textContent = '→';
      const rIn = el('input', { type:'text', value: pair.right || '', style:'flex:1;padding:7px 10px;border:2px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;' });
      lIn.onfocus = rIn.onfocus = () => { lIn.style.borderColor = 'var(--navy)'; rIn.style.borderColor = 'var(--navy)'; };
      lIn.onblur = rIn.onblur = () => { lIn.style.borderColor = 'var(--border)'; rIn.style.borderColor = 'var(--border)'; };
      row.appendChild(num); row.appendChild(lIn); row.appendChild(arrow); row.appendChild(rIn);
      pairsWrap.appendChild(row);
      refs.pairsLeft.push(lIn);
      refs.pairsRight.push(rIn);
    });
    body.appendChild(pairsWrap);
  }

  else if(sectionKey === 'cas') {
    refs.title = input(item.title);
    refs.enonce = textarea(item.enonce, 5);
    body.appendChild(field('Titre du cas', refs.title));
    body.appendChild(field('Énoncé HTML', refs.enonce));
    // Questions du cas
    const qWrap = el('div', { className:'qedit-field' });
    const qLbl = el('label', { className:'qedit-label' });
    qLbl.textContent = 'Questions du cas clinique';
    qWrap.appendChild(qLbl);
    refs.casQs = [];
    (item.questions || []).forEach((cq, qi) => {
      const qBox = el('div', { style:'border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;' });
      const qTitle = el('div', { style:'font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;' });
      qTitle.textContent = `Question ${qi + 1}`;
      const qText = textarea(cq.q, 2);
      const isMulti = Array.isArray(cq.correct);
      const opts = cq.options || ['','','',''];
      const optList2 = el('div', { className:'qedit-options', style:'margin-top:6px;' });
      const optInputs2 = [];
      const corrToggles2 = [];
      opts.forEach((opt, oi) => {
        const row2 = el('div', { className:'qedit-option' });
        const letter2 = el('div', { className:'qedit-option-letter' });
        letter2.textContent = ['A','B','C','D','E'][oi];
        const txt2 = el('input', { type:'text', value: opt });
        const isC = isMulti ? cq.correct.includes(oi) : cq.correct === oi;
        const tog2 = el('div', { className:'qedit-option-correct' + (isC ? ' selected' : ''), title:'Bonne réponse' });
        tog2.dataset.idx = oi;
        tog2.addEventListener('click', () => {
          if(!isMulti) corrToggles2.forEach(t => t.classList.remove('selected'));
          tog2.classList.toggle('selected');
        });
        row2.appendChild(tog2); row2.appendChild(letter2); row2.appendChild(txt2);
        optInputs2.push(txt2);
        corrToggles2.push(tog2);
        optList2.appendChild(row2);
      });
      const expIn = textarea(cq.explain, 2);
      const expLbl = el('div', { style:'font-size:11px;color:var(--muted);margin:6px 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;' });
      expLbl.textContent = 'Explication';
      qBox.appendChild(qTitle); qBox.appendChild(qText); qBox.appendChild(optList2);
      qBox.appendChild(expLbl); qBox.appendChild(expIn);
      qWrap.appendChild(qBox);
      refs.casQs.push({ qText, optInputs: optInputs2, corrToggles: corrToggles2, isMulti, expIn });
    });
    body.appendChild(qWrap);
  }

  return refs;
}

function collectQuestionFields(sectionKey, item, refs) {
  if(sectionKey === 'flashcards') {
    if(!refs.front.value.trim()) { toast('Le champ Question est vide', 'error'); return null; }
    return { cat: refs.cat.value.trim(), front: refs.front.value.trim(), back: refs.back.value.trim() };
  }
  if(sectionKey === 'qcm') {
    if(!refs.q.value.trim()) { toast('La question est vide', 'error'); return null; }
    const options = refs.optInputs.map(i => i.value.trim());
    const selected = refs.correctToggles.map((t,i) => t.classList.contains('selected') ? i : -1).filter(i => i >= 0);
    if(selected.length === 0) { toast('Sélectionne au moins une bonne réponse', 'error'); return null; }
    const correct = refs.isMulti ? selected : selected[0];
    return { q: refs.q.value.trim(), options, correct, explain: refs.explain.value.trim() };
  }
  if(sectionKey === 'vraiFaux') {
    if(!refs.statement.value.trim()) { toast('L\'affirmation est vide', 'error'); return null; }
    const answer = refs.vBtn.classList.contains('on');
    return { statement: refs.statement.value.trim(), answer, explain: refs.explain.value.trim() };
  }
  if(sectionKey === 'speed') {
    if(!refs.q.value.trim() || !refs.a.value.trim()) { toast('Question et réponse requises', 'error'); return null; }
    return { q: refs.q.value.trim(), a: refs.a.value.trim(), hint: '' };
  }
  if(sectionKey === 'associations') {
    if(!refs.title.value.trim()) { toast('Titre requis', 'error'); return null; }
    const pairs = refs.pairsLeft.map((l, i) => ({ left: l.value.trim(), right: refs.pairsRight[i].value.trim() }));
    return { title: refs.title.value.trim(), pairs };
  }
  if(sectionKey === 'cas') {
    if(!refs.title.value.trim()) { toast('Titre requis', 'error'); return null; }
    const questions = refs.casQs.map(cq => {
      const options = cq.optInputs.map(i => i.value.trim());
      const sel = cq.corrToggles.map((t,i) => t.classList.contains('selected') ? i : -1).filter(i => i >= 0);
      const correct = cq.isMulti ? sel : (sel[0] ?? 0);
      return { q: cq.qText.value.trim(), options, correct, explain: cq.expIn.value.trim() };
    });
    return { title: refs.title.value.trim(), enonce: refs.enonce.value.trim(), questions };
  }
  return {};
}

function deleteQuiz(quiz) {
  if(!confirm(`Supprimer définitivement « ${quiz.title} » ?\n\nExporte-le d'abord si tu veux le garder.`)) return;
  app.library = app.library.filter(q => q.id !== quiz.id);
  Storage.setLibrary(app.library);
  delete app.stats[quiz.id];
  Storage.setStats(app.stats);
  toast('Quiz supprimé', 'success');
  renderApp();
}

function exportFullLibrary() {
  const payload = {
    exportedAt: new Date().toISOString(),
    library: app.library,
    stats: app.stats
  };
  downloadJson('ednquest_library_full.json', payload);
  toast('Bibliothèque complète exportée', 'success');
}

/* ============================================================

function renderPlay(view) {
  const quiz = app.library.find(q => q.id === app.routeParams.id);
  if(!quiz) { navigate('library'); return; }
  const mode = app.routeParams.mode;
  app.play = {
    quiz: quiz, mode: mode, idx: 0, score: 0, streak: 0, answered: false, history: [],
    timer: null, timeLeft: 0, shuffled: null,
    currentAssoc: null, matchSelected: null, matchedPairs: [], currentCase: null
  };
  renderPlayHead(view, quiz, getModeTitle(mode));

  if(mode === 'flashcards') renderFlashcard(view);
  else if(mode === 'qcm') { app.play.shuffled = shuffle(quiz.qcm); renderQCM(view); }
  else if(mode === 'vf') { app.play.shuffled = shuffle(quiz.vraiFaux); renderVF(view); }
  else if(mode === 'assoc') renderAssoc(view);
  else if(mode === 'speed') renderSpeedIntro(view);
  else if(mode === 'cas') renderCasList(view);
  else navigate('quiz', { id: quiz.id });
}

function getModeTitle(mode) {
  return {

function getCorrectSet(item) {
  // Normalise correct en Set d'index, qu'il soit number ou array
  if(Array.isArray(item.correct)) return new Set(item.correct);
  return new Set([item.correct]);
}
function isMultipleChoice(item) {
  return Array.isArray(item.correct) && item.correct.length > 1;
}

function renderQCM(view) {
  if(app.play.idx >= app.play.shuffled.length) { renderEnd(view, 'QCM EDN', '🎯'); return; }
  const wrap = getPlayWrap(view);
  wrap.innerHTML = '';
  const item = app.play.shuffled[app.play.idx];
  app.play.answered = false;
  app.play.qcmSelected = new Set(); // sélections en cours (mode multi)

  const progress = el('div', { className:'progress-bar' });
  const fill = el('div', { className:'progress-fill' });
  fill.style.width = ((app.play.idx+1)/app.play.shuffled.length*100)+'%';
  progress.appendChild(fill);
  wrap.appendChild(progress);

  const box = el('div', { className:'qbox' });
  const head = el('div', { className:'qhead' });
  const isMulti = isMultipleChoice(item);
  const correctSet = getCorrectSet(item);
  head.innerHTML = `
    <span class="qtitle">Question ${app.play.idx+1} / ${app.play.shuffled.length}</span>
    <span class="qcategory" style="${isMulti?'background:#EDE9FE;color:#6B46C1;':''}">
      ${isMulti ? '☑ QCM — ' + correctSet.size + ' bonnes réponses' : 'QCM'}
    </span>
  `;
  box.appendChild(head);
  box.appendChild(el('div', { className:'qtext', html:item.q }));

  if(isMulti) {
    const hint = el('div', { style:'font-size:12px;color:var(--purple);background:var(--purple-light);padding:7px 12px;border-radius:8px;margin-bottom:12px;font-weight:600;' });
    hint.textContent = `Sélectionne les ${correctSet.size} bonnes réponses puis valide.`;
    box.appendChild(hint);
  }

  const options = el('div', { className:'options' });
  item.options.forEach((opt, i) => {
    const letter = String.fromCharCode(65+i);
    const btn = el('button', { className:'opt' });
    btn.innerHTML = `<span class="letter">${letter}</span><span>${opt}</span>`;
    if(isMulti) {
      // Mode multi : toggle sélection, validation explicite
      btn.addEventListener('click', ()=>{
        if(app.play.answered) return;
        if(app.play.qcmSelected.has(i)) {
          app.play.qcmSelected.delete(i);
          btn.classList.remove('selected-multi');
          btn.querySelector('.letter').style.background = '';
          btn.querySelector('.letter').style.color = '';
          btn.querySelector('.letter').style.borderColor = '';
        } else {
          app.play.qcmSelected.add(i);
          btn.classList.add('selected-multi');
          btn.querySelector('.letter').style.background = 'var(--purple)';
          btn.querySelector('.letter').style.color = 'white';
          btn.querySelector('.letter').style.borderColor = 'var(--purple)';
        }
        // Activer le bouton valider dès qu'au moins 1 sélectionné
        const validateBtn = $('validate-multi-btn');
        if(validateBtn) validateBtn.disabled = app.play.qcmSelected.size === 0;
      });
    } else {
      // Mode mono : réponse immédiate au clic
      btn.addEventListener('click', (function(idx){ return ()=>answerQCM(idx, view); })(i));
    }
    options.appendChild(btn);
  });
  box.appendChild(options);
  box.appendChild(el('div', { id:'feedback-zone' }));
  wrap.appendChild(box);

  const nav = el('div', { className:'nav-row' });
  nav.appendChild(el('button', { className:'btn ghost', onclick: ()=>navigate('quiz', { id: app.play.quiz.id }) }, ['← Quitter']));

    }, ['Valider mes réponses ✓']);

  }

    id:'next-btn',
    className:'btn',
    disabled:'true',

  }, [app.play.idx === app.play.shuffled.length-1 ? 'Voir mon score 🏁' : 'Suivant ▶']);
  nav.appendChild(nextBtn);
  wrap.appendChild(nav);
}

function answerQCM(selected, view) {
  // Mode réponse unique
  if(app.play.answered) return;
  app.play.answered = true;
  const item = app.play.shuffled[app.play.idx];
  const correctSet = getCorrectSet(item);
  const correct = correctSet.has(selected);
  document.querySelectorAll('.opt').forEach((btn, i) => {
    btn.disabled = true;
    if(correctSet.has(i)) btn.classList.add('correct');
    if(i === selected && !correct) btn.classList.add('wrong');
  });
  if(correct) { app.play.score++; app.play.streak++; floatEmoji(app.play.streak>=3?'🔥':'✅'); }
  else { app.play.streak = 0; floatEmoji('💡'); }
  app.play.history.push({ correct: correct, q: item.q, explain: item.explain||'', options: item.options, correctIdx: item.correct, type:'qcm' });
  updateScoreUI();
  const fb = el('div', { className:'feedback ' + (correct?'correct':'wrong') });
  fb.innerHTML = `<strong>${correct?'✅ Bien joué !':'❌ Raté.'}</strong><div class="explain">${item.explain||''}</div>`;
  $('feedback-zone').appendChild(fb);
  $('next-btn').disabled = false;
}

function answerQCMMulti(view) {
  // Mode réponses multiples
  if(app.play.answered) return;
  app.play.answered = true;
  const item = app.play.shuffled[app.play.idx];
  const correctSet = getCorrectSet(item);
  const selected = app.play.qcmSelected;

  // Correct si l'ensemble sélectionné est identique à l'ensemble attendu
  const allCorrect = selected.size === correctSet.size &&
    [...selected].every(i => correctSet.has(i));

  document.querySelectorAll('.opt').forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.remove('selected-multi');
    btn.querySelector('.letter').style = '';
    if(correctSet.has(i)) btn.classList.add('correct');
    if(selected.has(i) && !correctSet.has(i)) btn.classList.add('wrong');
  });

  const validateBtn = $('validate-multi-btn');
  if(validateBtn) validateBtn.disabled = true;

  if(allCorrect) { app.play.score++; app.play.streak++; floatEmoji(app.play.streak>=3?'🔥':'✅'); }
  else { app.play.streak = 0; floatEmoji('💡'); }
  app.play.history.push({ correct: allCorrect, q: item.q, explain: item.explain||'', options: item.options, correctIdx: item.correct, type:'qcm-multi' });
  updateScoreUI();

  // Feedback détaillé
  const missed = [...correctSet].filter(i => !selected.has(i));
  const extra = [...selected].filter(i => !correctSet.has(i));
  let detail = '';
  if(!allCorrect) {
    if(missed.length) detail += `<div style="margin-top:5px;">Oubliée${missed.length>1?'s':''} : <strong>${missed.map(i=>String.fromCharCode(65+i)).join(', ')}</strong></div>`;
    if(extra.length) detail += `<div style="margin-top:3px;">En trop : <strong>${extra.map(i=>String.fromCharCode(65+i)).join(', ')}</strong></div>`;
  }
  const fb = el('div', { className:'feedback ' + (allCorrect?'correct':'wrong') });
  fb.innerHTML = `<strong>${allCorrect?'✅ Parfait, toutes les bonnes réponses !':'❌ Incomplet ou incorrect.'}</strong>${detail}<div class="explain" style="margin-top:8px;">${item.explain||''}</div>`;
  $('feedback-zone').appendChild(fb);
  $('next-btn').disabled = false;
}

    }, [L]));

function selectMatch(elm, view) {
  if(elm.classList.contains('matched')) return;
  if(!app.play.matchSelected) {
    app.play.matchSelected = elm;
    elm.classList.add('selected');
    return;
  }
  if(app.play.matchSelected === elm) {
    elm.classList.remove('selected');
    app.play.matchSelected = null;
    return;
  }
  const s1 = app.play.matchSelected.getAttribute('data-side');
  const s2 = elm.getAttribute('data-side');
  if(s1 === s2) {
    app.play.matchSelected.classList.remove('selected');
    app.play.matchSelected = elm;
    elm.classList.add('selected');
    return;
  }
  const v1 = app.play.matchSelected.getAttribute('data-val');
  const v2 = elm.getAttribute('data-val');
  const pair = app.play.currentAssoc.pairs.find(p=>
    (p.left===v1 && p.right===v2) || (p.left===v2 && p.right===v1)
  );
  if(pair) {
    app.play.matchSelected.classList.remove('selected');
    app.play.matchSelected.classList.add('matched');
    elm.classList.add('matched');
    app.play.matchSelected = null;
    app.play.matchedPairs.push(pair);
    if(app.play.matchedPairs.length === app.play.currentAssoc.pairs.length) {
      floatEmoji('🎉');
      $('next-btn').disabled = false;
      app.play.history.push({ correct: true, q: app.play.currentAssoc.title });
      app.play.streak++;
      updateScoreUI();
    }
  } else {
    const sel = app.play.matchSelected;
    sel.classList.remove('selected');
    sel.classList.add('error');
    elm.classList.add('error');
    setTimeout(()=>{
      sel.classList.remove('error');
      elm.classList.remove('error');
    }, 500);
    app.play.matchSelected = null;
    app.play.streak = 0;
    updateScoreUI();
  }
}

  if(app.play.idx === 0) {
    const enonce = el('div', { className:'case-enonce' });
    enonce.innerHTML = `<strong>📜 ÉNONCÉ</strong><br>${cas.enonce}`;
    wrap.appendChild(enonce);
  }

  const box = el('div', { className:'qbox' });
  box.appendChild(el('div', { className:'case-question', html:qItem.q }));

  const options = el('div', { className:'options' });
  qItem.options.forEach((opt, i) => {
    const letter = String.fromCharCode(65+i);
    const btn = el('button', {
      className:'opt',
      onclick: (function(idx){ return ()=>answerCas(idx, view); })(i)
    });
    btn.innerHTML = `<span class="letter">${letter}</span><span>${opt}</span>`;
    options.appendChild(btn);
  });
  box.appendChild(options);
  box.appendChild(el('div', { id:'feedback-zone' }));
  wrap.appendChild(box);

  const nav = el('div', { className:'nav-row' });
  nav.appendChild(el('button', { className:'btn ghost', onclick: ()=>renderCasList(view) }, ['← Liste des cas']));
  nav.appendChild(el('button', {
    id:'next-btn',
    className:'btn',
    disabled:'true',
    onclick: ()=>{ app.play.idx++; renderCas(view); }
  }, [app.play.idx === cas.questions.length-1 ? 'Voir le bilan 🏁' : 'Question suivante ▶']));
  wrap.appendChild(nav);
}

function answerCas(selected, view) {
  if(app.play.answered) return;
  app.play.answered = true;
  const cas = app.play.quiz.cas[app.play.currentCase];
  const item = cas.questions[app.play.idx];
  const correctSet = getCorrectSet(item);
  const correct = correctSet.has(selected);
  document.querySelectorAll('.opt').forEach((btn, i) => {
    btn.disabled = true;
    if(correctSet.has(i)) btn.classList.add('correct');
    if(i === selected && !correct) btn.classList.add('wrong');
  });
  if(correct) { app.play.score++; app.play.streak++; floatEmoji(app.play.streak>=3?'🔥':'✅'); }
  else { app.play.streak = 0; floatEmoji('💡'); }
  app.play.history.push({ correct: correct, q: item.q, explain: item.explain||'', options: item.options, correctIdx: item.correct, type:'cas' });
  updateScoreUI();
  const fb = el('div', { className:'feedback ' + (correct?'correct':'wrong') });
  fb.innerHTML = `<strong>${correct?'✅ Exact !':'❌ Non.'}</strong><div class="explain">${item.explain||''}</div>`;
  $('feedback-zone').appendChild(fb);
  $('next-btn').disabled = false;
}

function renderReview(view, errors, backFn) {
  const wrap = getPlayWrap(view);
  wrap.innerHTML = '';

  const head = el('div', { style:'margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;' });
  head.innerHTML = `
    <div style="flex:1;">
      <h2 style="color:var(--navy);font-size:19px;">📋 Questions ratées</h2>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">${errors.length} question${errors.length>1?'s':''} à retravailler</div>
    </div>
  `;
  const backBtn = el('button', { className:'btn ghost', onclick: backFn }, ['← Retour au score']);
  head.appendChild(backBtn);
  wrap.appendChild(head);

  const list = el('div', { className:'review-list' });

  errors.forEach((h, idx) => {
    const item = el('div', { className:'review-item' });

    // Type badge
    const typeLabelMap = { 'qcm':'QCM', 'qcm-multi':'QCM multi', 'vf':'Vrai / Faux', 'speed':'Défi Express', 'cas':'Cas clinique' };
    const typeLabel = typeLabelMap[h.type] || 'Question';
    item.innerHTML = `<div class="review-type">❌ ${typeLabel}</div>`;

    // Question
    const qDiv = el('div', { className:'review-q', html: `${idx+1}. ${h.q}` });
    item.appendChild(qDiv);

    // Selon le type : affichage adapté
    if((h.type === 'qcm' || h.type === 'qcm-multi' || h.type === 'cas') && h.options) {
      const correctSet = Array.isArray(h.correctIdx) ? new Set(h.correctIdx) : new Set([h.correctIdx]);
      const optsDiv = el('div', { className:'review-opts' });
      h.options.forEach((opt, i) => {
        const isCorrect = correctSet.has(i);
        const optEl = el('div', { className:'review-opt ' + (isCorrect ? 'ok' : 'neutral') });
        optEl.innerHTML = `<span style="font-weight:700;flex-shrink:0;">${String.fromCharCode(65+i)}.</span><span>${opt}</span>${isCorrect?' <span style="margin-left:auto;">✓</span>':''}`;
        optsDiv.appendChild(optEl);
      });
      item.appendChild(optsDiv);
    }

    if(h.type === 'vf') {
      const ans = el('div', { className:'review-answer' });
      ans.innerHTML = `Bonne réponse : <strong>${h.answer ? '✅ VRAI' : '❌ FAUX'}</strong>`;
      item.appendChild(ans);
    }

    if(h.type === 'speed') {
      const ans = el('div', { className:'review-answer' });
      ans.innerHTML = `Réponse attendue : <strong>${escapeHtml(h.explain)}</strong>`;
      item.appendChild(ans);
    }

    if(h.explain && h.type !== 'speed') {
      const expDiv = el('div', { className:'review-explain', html: h.explain });
      item.appendChild(expDiv);
    }

    list.appendChild(item);
  });

  wrap.appendChild(list);

  const nav = el('div', { className:'nav-row', style:'justify-content:center;margin-top:20px;' });
  nav.appendChild(el('button', { className:'btn ghost', onclick: backFn }, ['← Retour au score']));
  wrap.appendChild(nav);
}

function renderStats(view) {
  const head = el('div', { className:'player-head' });
  head.innerHTML = `
    <button class="back-btn">← Bibliothèque</button>
    <div class="title-box" style="flex:1;">
      <h2>📊 Statistiques globales</h2>
      <div class="subtitle">Vue d'ensemble de ta progression</div>
    </div>
  `;
  head.querySelector('.back-btn').addEventListener('click', ()=>navigate('library'));
  view.appendChild(head);

  const totalQuizzes = app.library.length;
  const playedQuizzes = app.library.filter(q => app.stats[q.id] && app.stats[q.id].sessions && app.stats[q.id].sessions.length).length;
  let totalSessions = 0, totalQuestions = 0, totalCorrect = 0;
  Object.values(app.stats).forEach(s => {
    (s.sessions||[]).forEach(sess => {
      totalSessions++;
      totalQuestions += sess.total;
      totalCorrect += sess.ok;
    });
  });
  const avgScore = totalQuestions > 0 ? Math.round(totalCorrect/totalQuestions*100) : 0;
  const masteredCount = app.library.filter(q => getQuizStatus(q) === 'mastered').length;

  const hero = el('div', { className:'stats-hero' });
  hero.innerHTML = `
    <div class="hero-card"><div class="val">${totalQuizzes}</div><div class="lab">Quiz en bibliothèque</div></div>
    <div class="hero-card"><div class="val">${playedQuizzes}</div><div class="lab">Quiz entamés</div></div>
    <div class="hero-card"><div class="val">${totalSessions}</div><div class="lab">Sessions totales</div></div>
    <div class="hero-card"><div class="val">${avgScore}%</div><div class="lab">Réussite moyenne</div></div>
    <div class="hero-card"><div class="val">${masteredCount}</div><div class="lab">🏆 Maîtrisés</div></div>
  `;
  view.appendChild(hero);

  if(totalQuizzes > 0) {
    const bySpec = {};
    app.library.forEach(q => {
      const s = q.specialty || 'Autre';
      if(!bySpec[s]) bySpec[s] = { count:0, played:0, pcts:[] };
      bySpec[s].count++;
      const sessions = (app.stats[q.id] && app.stats[q.id].sessions) || [];
      if(sessions.length) {
        bySpec[s].played++;
        const avg = sessions.reduce((a,x)=>a+x.pct,0) / sessions.length;
        bySpec[s].pcts.push(avg);
      }
    });
    const specBox = el('div', { className:'specialty-stats' });
    specBox.appendChild(el('h3', {}, ['📂 Par spécialité']));
    Object.keys(bySpec).sort((a,b)=>{
      const ia = EDN_SPECIALTIES.indexOf(a);
      const ib = EDN_SPECIALTIES.indexOf(b);
      if(ia === -1 && ib === -1) return a.localeCompare(b);
      if(ia === -1) return 1;
      if(ib === -1) return -1;
      return ia - ib;
    }).forEach(spec => {
      const d = bySpec[spec];
      const avg = d.pcts.length ? Math.round(d.pcts.reduce((a,b)=>a+b,0)/d.pcts.length) : 0;
      const row = el('div', { className:'stat-row' });
      row.innerHTML = `
        <div class="name">${escapeHtml(spec)}</div>
        <div class="bar"><div class="bar-fill" style="width:${avg}%;"></div></div>
        <div class="val">${avg}% · ${d.played}/${d.count}</div>
      `;
      specBox.appendChild(row);
    });
    view.appendChild(specBox);
  }

  const allSessions = [];
  Object.entries(app.stats).forEach(entry => {
    const qid = entry[0], s = entry[1];
    const quiz = app.library.find(q=>q.id===qid);
    if(!quiz) return;
    (s.sessions||[]).forEach(sess => {
      allSessions.push(Object.assign({}, sess, { quizTitle: quiz.title, quizIcon: quiz.icon }));
    });
  });
  allSessions.sort((a,b)=>new Date(b.at).getTime() - new Date(a.at).getTime());
  if(allSessions.length > 0) {
    const recentBox = el('div', { className:'specialty-stats' });
    recentBox.appendChild(el('h3', {}, ['🕒 Sessions récentes']));
    allSessions.slice(0, 10).forEach(sess => {
      const row = el('div', { className:'stat-row' });
      row.innerHTML = `
        <div class="name">${sess.quizIcon||'📘'} ${escapeHtml(sess.quizTitle)} <span style="color:var(--muted);font-size:11px;">(${sess.mode})</span></div>
        <div class="bar"><div class="bar-fill" style="width:${sess.pct}%;"></div></div>
        <div class="val">${sess.pct}% · ${formatDate(sess.at)}</div>
      `;
      recentBox.appendChild(row);
    });
    view.appendChild(recentBox);
  }

  const actions = el('div', { style:'display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;' });
  actions.appendChild(el('button', { className:'btn', onclick: exportFullLibrary }, ['⬇ Exporter toute la bibliothèque']));
  actions.appendChild(el('button', { className:'btn ghost danger', onclick: resetAllStats }, ['🗑 Effacer mes stats']));
  view.appendChild(actions);

  if(totalQuizzes === 0) {
    view.appendChild(el('div', { className:'empty-state', style:'margin-top:30px;' }, [
      el('span', { className:'big-emoji' }, ['📊']),
      el('h3', {}, ['Pas encore de stats']),
      el('p', {}, ['Importe et joue à quelques quiz pour voir ta progression apparaître ici.'])
    ]));
  }
}

function resetAllStats() {
  if(!confirm("Effacer TOUTES tes statistiques ?\n\nLes quiz restent intacts, seuls les scores sont effacés.")) return;
  app.stats = {};
  Storage.setStats({});
  toast('Stats effacées', 'success');
  renderApp();
}

let importTab = 'paste';
let importParsed = null;

function openImportModal() {
  closeModal();
  importTab = 'paste';
  importParsed = null;
  const backdrop = el('div', { className:'modal-backdrop', onclick:(e)=>{ if(e.target === backdrop) closeModal(); } });
  const modal = el('div', { className:'modal' });
  modal.innerHTML = `
    <div class="modal-head">
      <h2>⬆ Importer un quiz (JSON)</h2>
      <button class="modal-close" title="Fermer">✕</button>
    </div>
    <div class="modal-body">
      <div class="import-tabs">
        <button class="import-tab active" data-tab="paste">📋 Coller JSON</button>
        <button class="import-tab" data-tab="file">📁 Fichier</button>
        <button class="import-tab" data-tab="bulk">📦 Import multiple</button>
      </div>
      <div id="import-content"></div>
      <div id="import-result"></div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="import-cancel">Annuler</button>
      <button class="btn success" id="import-confirm" disabled>⬆ Importer</button>
    </div>
  `;
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  modal.querySelector('.modal-close').addEventListener('click', closeModal);
  modal.querySelector('#import-cancel').addEventListener('click', closeModal);
  modal.querySelectorAll('.import-tab').forEach(t => {
    t.addEventListener('click', ()=>{
      modal.querySelectorAll('.import-tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      importTab = t.getAttribute('data-tab');
      renderImportContent();
    });
  });
  modal.querySelector('#import-confirm').addEventListener('click', confirmImport);
  renderImportContent();
