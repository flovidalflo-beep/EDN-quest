function closeModal() {
  document.querySelectorAll('.modal-backdrop').forEach(m=>m.remove());
}

function renderImportContent() {
  const cont = $('import-content');
  const result = $('import-result');
  if(!cont) return;
  cont.innerHTML = '';
  result.innerHTML = '';
  importParsed = null;
  $('import-confirm').disabled = true;

  if(importTab === 'paste') {
    const hint = el('div', { className:'alert info' });
    hint.innerHTML = 'Colle ici ton JSON (un seul quiz). La validation se fait automatiquement.';
    cont.appendChild(hint);
    const ta = el('textarea', {
      className:'json-textarea',
      placeholder:'{\n  "title": "…",\n  "specialty": "…",\n  …\n}',
      oninput: (ev) => validateImportText(ev.target.value, false)
    });
    cont.appendChild(ta);
  }
  else if(importTab === 'file') {
    const drop = el('div', { className:'file-drop' });
    drop.innerHTML = `
      <div class="icon">📁</div>
      <div class="main-text">Clique ou dépose un fichier .json ici</div>
      <div class="sub-text">Un seul quiz par fichier</div>
    `;
    drop.addEventListener('click', ()=>$('file-import').click());
    drop.addEventListener('dragover', (e)=>{ e.preventDefault(); drop.classList.add('dragging'); });
    drop.addEventListener('dragleave', ()=>drop.classList.remove('dragging'));
    drop.addEventListener('drop', (e)=>{
      e.preventDefault();
      drop.classList.remove('dragging');
      if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], false);
    });
    cont.appendChild(drop);
    const fileInput = $('file-import');
    fileInput.value = '';
    fileInput.onchange = (ev) => {
      if(ev.target.files[0]) readFile(ev.target.files[0], false);
    };
  }
  else if(importTab === 'bulk') {
    const hint = el('div', { className:'alert info' });
    hint.innerHTML = 'Import multiple : colle un <strong>tableau</strong> de quiz <code>[ {...}, {...} ]</code>, OU un export complet de bibliothèque <code>{ library: [...], stats: {...} }</code>.';
    cont.appendChild(hint);
    const ta = el('textarea', {
      className:'json-textarea',
      placeholder:'[\n  { "title": "…", "specialty": "…", … },\n  { "title": "…", "specialty": "…", … }\n]',
      oninput: (ev) => validateImportText(ev.target.value, true)
    });
    cont.appendChild(ta);
    const fileBtn = el('button', {
      className:'btn ghost',
      style:'margin-top:10px;',
      onclick: ()=>{
        const input = document.createElement('input');
        input.type='file'; input.accept='.json,application/json';
        input.onchange = (e)=>{ if(e.target.files[0]) readFile(e.target.files[0], true); };
        input.click();
      }
    }, ['📁 …ou charger depuis un fichier']);
    cont.appendChild(fileBtn);
  }
}

function readFile(file, isBulk) {
  const reader = new FileReader();
  reader.onload = (e) => {
    validateImportText(e.target.result, isBulk);
    const ta = document.querySelector('.json-textarea');
    if(ta) ta.value = e.target.result;
  };
  reader.readAsText(file);
}

function validateImportText(text, isBulk) {
  const result = $('import-result');
  result.innerHTML = '';
  importParsed = null;
  $('import-confirm').disabled = true;
  if(!text || !text.trim()) return;
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch(e) {
    const err = el('div', { className:'alert error' });
    err.innerHTML = `<strong>Erreur JSON :</strong> ${escapeHtml(e.message)}`;
    result.appendChild(err);
    return;
  }

  // Normalize input to an array of quizzes
  let quizzes = [];
  if(isBulk) {
    if(Array.isArray(parsed)) quizzes = parsed;
    else if(parsed && Array.isArray(parsed.library)) quizzes = parsed.library;
    else {
      const err = el('div', { className:'alert error' });
      err.innerHTML = '<strong>Format invalide :</strong> attendu un tableau de quiz, ou { library: [...] }.';
      result.appendChild(err);
      return;
    }
  } else {
    quizzes = [parsed];
  }

  const allErrors = [];
  const validated = [];
  quizzes.forEach((q, i) => {
    const errs = validateQuiz(q);
    if(errs.length) {
      allErrors.push({ idx: i, title: q && q.title, errors: errs });
    } else {
      validated.push(q);
    }
  });

  if(allErrors.length) {
    const err = el('div', { className:'alert error' });
    err.innerHTML = `<strong>${allErrors.length} quiz non valide${allErrors.length>1?'s':''} :</strong><ul style="margin-top:6px;padding-left:22px;">${
      allErrors.map(e=>`<li>#${e.idx+1} ${e.title?'('+escapeHtml(e.title)+')':''} : ${e.errors.map(escapeHtml).join(' · ')}</li>`).join('')
    }</ul>`;
    result.appendChild(err);
  }

  if(validated.length === 0) return;

  importParsed = validated;
  const success = el('div', { className:'alert success' });
  success.innerHTML = `<strong>✅ ${validated.length} quiz prêt${validated.length>1?'s':''} à importer</strong>`;
  result.appendChild(success);

  validated.slice(0, 3).forEach(q => {
    const box = el('div', { className:'preview-box' });
    const rangHtml = (q.rang||[]).map(r=>`<span class="qc-badge rang-${r.toLowerCase()}">Rang ${r}</span>`).join(' ');
    const totalQ = totalQuestionCount(q);
    box.innerHTML = `
      <h4>${q.icon||'📘'} ${escapeHtml(q.title)}</h4>
      <div style="font-size:12px;color:var(--muted);">${escapeHtml(q.specialty||'')}${q.items && q.items.length?' — Items '+q.items.join('/'):''}</div>
      <div style="margin-top:6px;">${rangHtml}</div>
      <div class="preview-stats">
        <div class="preview-stat"><strong>${(q.flashcards||[]).length}</strong>🃏 Flash</div>
        <div class="preview-stat"><strong>${(q.qcm||[]).length}</strong>🎯 QCM</div>
        <div class="preview-stat"><strong>${(q.vraiFaux||[]).length}</strong>🪤 V/F</div>
        <div class="preview-stat"><strong>${(q.associations||[]).length}</strong>🔗 Assoc</div>
        <div class="preview-stat"><strong>${(q.speed||[]).length}</strong>⚡ Speed</div>
        <div class="preview-stat"><strong>${(q.cas||[]).length}</strong>📋 Cas</div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center;">Total : ${totalQ} questions</div>
    `;
    result.appendChild(box);
  });
  if(validated.length > 3) {
    const more = el('div', { style:'text-align:center;font-size:12px;color:var(--muted);margin-top:8px;' });
    more.textContent = `… et ${validated.length - 3} autres`;
    result.appendChild(more);
  }

  // Duplicate warning
  const dupes = validated.filter(q => q.id && app.library.some(x => x.id === q.id));
  if(dupes.length) {
    const warn = el('div', { className:'alert warning', style:'margin-top:12px;' });
    warn.innerHTML = `<strong>⚠ ${dupes.length} quiz existe${dupes.length>1?'nt':''} déjà</strong> (même ID) — ${dupes.length>1?'ils seront remplacés':'il sera remplacé'}.`;
    result.appendChild(warn);
  }

  $('import-confirm').disabled = false;
}

function confirmImport() {
  if(!importParsed || importParsed.length === 0) return;
  let added = 0, replaced = 0;
  importParsed.forEach(q => {
    normalizeQuiz(q);
    const existingIdx = app.library.findIndex(x => x.id === q.id);
    if(existingIdx >= 0) {
      app.library[existingIdx] = q;
      replaced++;
    } else {
      app.library.push(q);
      added++;
    }
  });
  Storage.setLibrary(app.library);
  closeModal();
  let msg = '';
  if(added) msg += `✅ ${added} quiz ajouté${added>1?'s':''}`;
  if(replaced) msg += (msg?' · ':'') + `🔄 ${replaced} remplacé${replaced>1?'s':''}`;
  toast(msg, 'success');
  navigate('library');
}

let kbdPanelOpen = false;
let currentKbdMode = null;

function showKbdBadge(mode) {
  currentKbdMode = mode;
  const badge = $('kbd-badge');
  const panel = $('kbd-panel');
  if(!badge || !panel) return;
  badge.style.display = 'block';
  kbdPanelOpen = false;
  panel.classList.remove('visible');
  panel.style.display = 'none';
  renderKbdPanel(mode);
}

function hideKbdBadge() {
  currentKbdMode = null;
  const badge = $('kbd-badge');
  const panel = $('kbd-panel');
  if(badge) badge.style.display = 'none';
  if(panel) { panel.style.display = 'none'; panel.classList.remove('visible'); }
  kbdPanelOpen = false;
}

function renderKbdPanel(mode) {
  const panel = $('kbd-panel');
  if(!panel) return;
  const hints = KBD_HINTS[mode] || [];
  panel.innerHTML = `<div style="font-weight:700;margin-bottom:6px;font-size:11px;opacity:0.6;text-transform:uppercase;letter-spacing:0.5px;">Raccourcis</div>` +
    hints.map(h =>
      `<div class="kbd-row">
        <div>${h.keys.map(k=>`<kbd>${k}</kbd>`).join(' ')}</div>
        <div class="kbd-action">${h.action}</div>
      </div>`
    ).join('');
}

function toggleKbdPanel() {
  const panel = $('kbd-panel');
  if(!panel) return;
  kbdPanelOpen = !kbdPanelOpen;
  if(kbdPanelOpen) {
    panel.style.display = 'block';
    setTimeout(()=>panel.classList.add('visible'), 10);
  } else {
    panel.classList.remove('visible');
    setTimeout(()=>{ panel.style.display = 'none'; }, 200);
  }
}

// Handler global clavier
function handleKeyboard(ev) {
  // Ignorer si focus dans un input/textarea
  const tag = document.activeElement && document.activeElement.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  // Ignorer si modal ouverte
  if(document.querySelector('.modal-backdrop')) return;

  const key = ev.key;
  const mode = app.play && app.play.mode;
  const route = app.route;

  // Fermer panel raccourcis avec Échap si ouvert
  if(key === 'Escape' && kbdPanelOpen) { toggleKbdPanel(); ev.preventDefault(); return; }

  // Afficher/cacher le panel raccourcis avec ?
  if(key === '?') { if(currentKbdMode) toggleKbdPanel(); ev.preventDefault(); return; }

  // ---- BIBLIOTHÈQUE / autres vues non-jeu ----
  if(route !== 'play') return;

  // ---- FLASHCARDS ----
  if(mode === 'flashcards') {
    if(key === ' ' || key === 'Spacebar') {
      ev.preventDefault();
      const fc = document.querySelector('.flashcard');
      if(fc) fc.classList.toggle('flipped');
    } else if(key === 'ArrowRight') {
      ev.preventDefault();
      const btn = document.querySelector('.nav-row .btn:not(.ghost)');
      if(btn && !btn.disabled) btn.click();
    } else if(key === 'ArrowLeft') {
      ev.preventDefault();
      const btn = document.querySelector('.nav-row .btn.ghost');
      if(btn && !btn.disabled && btn.textContent.includes('Précédent')) btn.click();
    } else if(key === 'Escape') {
      navigate('quiz', { id: app.play.quiz.id });
    }
    return;
  }

  // ---- QCM (mono et multi) ----
  if(mode === 'qcm') {
    // A B C D → sélectionner option
    if(['a','b','c','d','A','B','C','D'].includes(key)) {
      ev.preventDefault();
      const idx = key.toUpperCase().charCodeAt(0) - 65;
      const opts = document.querySelectorAll('.opt:not(:disabled)');
      if(opts[idx]) opts[idx].click();
      return;
    }
    // Entrée → valider multi OU passer suivant
    if(key === 'Enter') {
      ev.preventDefault();
      const validateBtn = $('validate-multi-btn');
      if(validateBtn && !validateBtn.disabled) { validateBtn.click(); return; }
      const nextBtn = $('next-btn');
      if(nextBtn && !nextBtn.disabled) nextBtn.click();
      return;
    }
    if(key === 'Escape') { navigate('quiz', { id: app.play.quiz.id }); return; }
  }

  // ---- VRAI/FAUX ----
  if(mode === 'vf') {
    if(!app.play.answered) {
      if(key === 'v' || key === 'V' || key === 'ArrowRight') {
        ev.preventDefault();
        const vraiBtn = document.querySelector('.vf-btn.vrai:not(:disabled)');
        if(vraiBtn) vraiBtn.click();
        return;
      }
      if(key === 'f' || key === 'F' || key === 'ArrowLeft') {
        ev.preventDefault();
        const fauxBtn = document.querySelector('.vf-btn.faux:not(:disabled)');
        if(fauxBtn) fauxBtn.click();
        return;
      }
    }
    if(key === 'Enter') {
      ev.preventDefault();
      const nextBtn = $('next-btn');
      if(nextBtn && !nextBtn.disabled) nextBtn.click();
      return;
    }
    if(key === 'Escape') { navigate('quiz', { id: app.play.quiz.id }); return; }
  }

  // ---- DÉFI EXPRESS ----
  if(mode === 'speed') {
    // Entrée : révéler OU passer suivant (géré dans l'input aussi, mais ici pour le cas hors-input)
    if(key === 'Enter') {
      ev.preventDefault();
      const revealBtn = $('reveal-btn');
      if(revealBtn) { revealBtn.click(); return; }
      // Après révélation : "suivant" injecté dans feedback-zone
      const nextBtn = document.querySelector('#feedback-zone .btn');
      if(nextBtn) { nextBtn.click(); return; }
      return;
    }
    // O / ArrowUp → correct
    if(key === 'o' || key === 'O' || key === 'ArrowUp') {
      ev.preventDefault();
      const btnOui = document.querySelector('.vf-btn.vrai');
      if(btnOui && !btnOui.disabled) btnOui.click();
      return;
    }
    // N / ArrowDown / Suppr / Delete → faux
    if(key === 'n' || key === 'N' || key === 'ArrowDown' || key === 'Delete' || key === 'Backspace') {
      // Backspace seulement hors input
      if((key === 'Backspace') && document.activeElement && document.activeElement.id === 'speed-input') return;
      ev.preventDefault();
      const btnNon = document.querySelector('.vf-btn.faux');
      if(btnNon && !btnNon.disabled) btnNon.click();
      return;
    }
    if(key === 'Escape') { navigate('quiz', { id: app.play.quiz.id }); return; }
  }

  // ---- CAS CLINIQUES ----
  if(mode === 'cas') {
    if(['a','b','c','d','A','B','C','D'].includes(key)) {
      ev.preventDefault();
      const idx = key.toUpperCase().charCodeAt(0) - 65;
      const opts = document.querySelectorAll('.opt:not(:disabled)');
      if(opts[idx]) opts[idx].click();
      return;
    }
    if(key === 'Enter') {
      ev.preventDefault();
      const nextBtn = $('next-btn');
      if(nextBtn && !nextBtn.disabled) nextBtn.click();
      return;
    }
    if(key === 'Escape') { navigate('quiz', { id: app.play.quiz.id }); return; }
  }

  // ---- ASSOCIATIONS ----
  if(mode === 'assoc') {
    if(key === 'Escape') { navigate('quiz', { id: app.play.quiz.id }); return; }
  }

  // ---- ÉCRAN DE FIN (pas de mode actif) ----
  if(!mode && route === 'play') {
    if(key === 'Escape') { navigate('quiz', { id: app.play.quiz && app.play.quiz.id }); return; }
    if(key === 'r' || key === 'R') {
      const replayBtn = document.querySelector('.btn.success');
      if(replayBtn) { replayBtn.click(); return; }
    }
    if(key === 'e' || key === 'E') {
      const errBtn = document.querySelector('.btn.danger');
      if(errBtn) { errBtn.click(); return; }
    }
  }
}

// Initialisation des raccourcis
function initKeyboard() {
  document.addEventListener('keydown', handleKeyboard);
  const badge = $('kbd-badge');
  if(badge) badge.addEventListener('click', toggleKbdPanel);
}

// Surcharge de renderPlayHead pour afficher le badge au bon mode
const _originalRenderPlayHead = renderPlayHead;
window.renderPlayHead = function(view, quiz, title) {
  _originalRenderPlayHead(view, quiz, title);
  const modeForKbd = app.play.mode === 'qcm' ? 'qcm' : app.play.mode;
  showKbdBadge(modeForKbd);
};

// Créer une fonction originale de navigation
const _navigateOriginal = navigate;  // Sauvegarde IMMÉDIATE

// Surcharge dans un contexte où la référence est sûre
window.navigate = function(route, params) {
  _navigateOriginal(route, params);  // Appelle la version sauvegardée
  if(route !== 'play') hideKbdBadge();
};

// Alias pratique pour le logo
function navigateToLibrary() {
  window.navigate('library');
}


// Afficher badge sur l'écran de fin
const _origRenderEnd = renderEnd;
function renderEnd(view, modeName, modeIcon) {
  _origRenderEnd(view, modeName, modeIcon);
  showKbdBadge('end');
  // Raccourcis écran de fin
}

function boot() {
  // Load from storage
  app.library = Storage.getLibrary();
  app.stats = Storage.getStats();
  const savedUI = Storage.getUI();
  if(savedUI) Object.assign(app.ui, savedUI);

  // Seed initial quiz on first launch
  if(!Storage.isSeeded() && app.library.length === 0) {
    const seed = JSON.parse(JSON.stringify(INITIAL_QUIZ));
    normalizeQuiz(seed);
    app.library.push(seed);
    Storage.setLibrary(app.library);
    Storage.setSeeded();
  }

  initKeyboard();
  renderApp();
}
boot();

</script>
